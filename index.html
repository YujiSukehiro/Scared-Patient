<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scared Patient 3D</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: sans-serif;
    }
    #game-canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    #initials-modal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      padding: 20px;
      border: 2px solid red;
      border-radius: 10px;
      text-align: center;
      z-index: 100;
      display: none;
    }
    input {
      padding: 10px;
      font-size: 18px;
      text-align: center;
      text-transform: uppercase;
      margin: 10px 0;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }
    #offline-message {
      color: orange;
      margin-top: 10px;
    }
    #hud-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border: 2px solid red;
      border-radius: 8px;
      font-family: sans-serif;
      font-size: 18px;
      color: #fff;
      z-index: 10;
      pointer-events: none;
    }
    .hud-item {
      margin-bottom: 8px;
      text-shadow: 1px 1px 2px #000;
    }
    .hud-item:last-child {
      margin-bottom: 0;
    }
  </style>

  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
  <script src="js/fallback.js" defer></script>

  <!-- Game Scripts -->
  <script src="js/config.js" defer></script>
  <script src="js/audio.js" defer></script>
  <script src="js/models.js" defer></script>
  <script src="js/world.js" defer></script>
  <script src="js/game.js" defer></script>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="hud-overlay">
    <div class="hud-item">Score: <span id="hud-score">0</span></div>
    <div class="hud-item">Distance: <span id="hud-distance">0</span>m</div>
    <div class="hud-item">Pills: <span id="hud-pills">0</span></div>
    <div class="hud-item">High Score: <span id="hud-highscore">0</span></div>
  </div>

  <div id="initials-modal">
    <h2>GAME OVER</h2>
    <p>Your Score: <span id="final-score">0</span></p>
    <form id="leaderboard-form">
      <input type="text" id="initials-input" placeholder="ABC" required>
      <br>
      <button type="submit">Submit Score</button>
    </form>
    <div id="offline-message"></div>
  </div>
</body>
</html>
